version: "3.9"

volumes:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  prometheus-data:

networks:
  fraud-net:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    networks: [fraud-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    networks: [fraud-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    networks: [fraud-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic transactions      --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fraud.predictions --partitions 6 --replication-factor 1
      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"

  fraud-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    networks: [fraud-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      WORKERS: 3
      WORKER_TIMEOUT: 30
      LOG_LEVEL: info
      KAFKA_BROKER: kafka:29092
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health',timeout=4); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    networks: [fraud-net]
    depends_on:
      fraud-api:
        condition: service_healthy
    entrypoint: ["python", "consumer.py"]
    environment:
      KAFKA_BROKER: kafka:29092
      INPUT_TOPIC: transactions
      OUTPUT_TOPIC: fraud.predictions
      CONSUMER_GROUP: fraud-detector-v1
      FLASK_API_URL: http://fraud-api:5000
      REQUEST_TIMEOUT_S: "2.0"
      MAX_RETRIES: "3"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    networks: [fraud-net]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
